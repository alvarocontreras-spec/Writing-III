<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPEAKING TASK: 30-60 SECONDS</title>
    <style>
        :root {
            --primary: #2980b9;
            --accent: #d35400;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f8f9f9;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 850px; width: 100%; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 20px; }
        .instr-es { font-style: italic; color: #7f8c8d; font-size: 0.85rem; }

        .video-card { background: #34495e; color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .video-btn { display: inline-block; background: var(--error); color: white; padding: 10px 20px; text-decoration: none; border-radius: 50px; font-weight: bold; }

        /* RECORDING BOX */
        .recording-box { 
            background: #fff; border: 3px solid #eee; padding: 25px; 
            border-radius: 15px; text-align: center; margin-top: 20px; 
        }
        
        #timer { 
            font-size: 3rem; font-weight: bold; color: #bdc3c7; margin-bottom: 10px; 
            font-family: 'Courier New', Courier, monospace;
        }
        .timer-short { color: #bdc3c7; }
        .timer-good { color: var(--success) !important; }
        .timer-long { color: var(--error) !important; }

        .record-btn { 
            background: var(--error); color: white; border: none; padding: 15px 40px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; 
            font-size: 1.1rem;
        }
        .record-btn.recording { animation: pulse 1.5s infinite; background: #c0392b; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .condition-badge {
            display: inline-block; background: #fdf2e9; color: var(--accent);
            padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 15px;
        }

        audio { width: 100%; margin-top: 20px; }
        .btn-submit { width: 100%; padding: 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: var(--success); color: white; font-size: 1.1rem; margin-top: 25px; }
        
        textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; height: 120px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎤 SPEAKING CHALLENGE</h1>
        <p class="instr-es">Presente Simple + Adverbios de Frecuencia</p>
    </header>

    <div class="video-card">
        <a href="https://drive.google.com/file/d/17kky1iczGlVTzWItCJVWJ4inlrqMY14S/view?usp=sharing" target="_blank" class="video-btn">▶️ WATCH ABBY'S VIDEO</a>
    </div>

    <span class="section-title">Step 1: Write your Script</span>
    <textarea id="reflectionBox" placeholder="Write your ideas here. Remember to use ALWAYS, USUALLY, SOMETIMES..."></textarea>

    <span class="section-title">Step 2: Record your Voice</span>
    <div class="recording-box">
        <div class="condition-badge">⏱️ GOAL: 30 - 60 SECONDS</div>
        <div id="timer">00:00</div>
        <button id="recordBtn" class="record-btn">🔴 START RECORDING</button>
        <audio id="audioPlayback" controls style="display:none;"></audio>
        <p id="recordStatus" style="margin-top:15px; font-size:0.9rem; color:#7f8c8d;">Click to start</p>
    </div>

    <button id="submitBtn" class="btn-submit" onclick="finalSubmission()">SUBMIT TASK</button>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let startTime;
    let timerInterval;
    let durationInSeconds = 0;

    const timerDisplay = document.getElementById('timer');
    const recordBtn = document.getElementById('recordBtn');
    const audioPlayback = document.getElementById('audioPlayback');
    const recordStatus = document.getElementById('recordStatus');

    function updateTimer() {
        durationInSeconds++;
        const mins = Math.floor(durationInSeconds / 60).toString().padStart(2, '0');
        const secs = (durationInSeconds % 60).toString().padStart(2, '0');
        timerDisplay.innerText = `${mins}:${secs}`;

        // Lógica de colores del tiempo
        if (durationInSeconds >= 30 && durationInSeconds <= 60) {
            timerDisplay.className = 'timer-good';
        } else if (durationInSeconds > 60) {
            timerDisplay.className = 'timer-long';
        } else {
            timerDisplay.className = 'timer-short';
        }
    }

    recordBtn.addEventListener('click', async () => {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            durationInSeconds = 0;
            timerDisplay.innerText = "00:00";
            timerDisplay.className = 'timer-short';

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                clearInterval(timerInterval);
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                audioPlayback.src = URL.createObjectURL(audioBlob);
                audioPlayback.style.display = 'block';
                
                if (durationInSeconds < 30) {
                    recordStatus.innerHTML = "❌ <b>Too short!</b> Please record at least 30 seconds.";
                } else if (durationInSeconds > 60) {
                    recordStatus.innerHTML = "❌ <b>Too long!</b> Try to keep it under 60 seconds.";
                } else {
                    recordStatus.innerHTML = "✅ <b>Perfect timing!</b> You can now submit.";
                }
            };

            mediaRecorder.start();
            timerInterval = setInterval(updateTimer, 1000);
            recordBtn.innerText = "⏹️ STOP";
            recordBtn.classList.add('recording');
        } else {
            mediaRecorder.stop();
            recordBtn.innerText = "🔴 RE-RECORD";
            recordBtn.classList.remove('recording');
        }
    });

    async function finalSubmission() {
        const text = document.getElementById('reflectionBox').value;
        if (!text || audioChunks.length === 0) return alert("Write your script and record your voice!");
        
        if (durationInSeconds < 30 || durationInSeconds > 60) {
            return alert("Your recording must be between 30 and 60 seconds!");
        }

        alert("✅ Task Completed! Great job.");
        location.reload();
    }
</script>
</body>
</html>
